services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GRAPH_SERVICE_URL: http://graph-service:3001
      NLP_SERVICE_URL: http://nlp-service:8001
      POSTGRES_HOST: postgres
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - graph-service
      - nlp-service

  nlp-service:
    build: ./nlp-service
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
    ports:
      - "8001:8001"
    depends_on:
      - redis

  graph-service:
    build:
      context: .
      dockerfile: graph-service/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
    ports:
      - "3001:3001"
    depends_on:
      - neo4j
      - postgres
      - redis

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    env_file: .env
    ports:
      - "3002:3002"
    depends_on:
      - redis

  decay-worker:
    build:
      context: .
      dockerfile: decay-worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
    depends_on:
      - neo4j
      - postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file: .env
    ports:
      - "5173:5173"
    depends_on:
      - gateway
      - notification-service

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  neo4j-data:
